<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEANUTS - Activities & Sales</title>
    <link rel="shortcut icon" type="image/jpg" href="logo.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #000000; font-family: 'Space Grotesk', system-ui, sans-serif; }
        .top-accent-banner { background-color: #FFCC00; height: 35px; width: 100%; }
        
        /* Navbar with Official Logo */
        .navbar-custom { background-color: #000000; padding: 0.5rem 0; }
        .navbar-brand-logo { height: 42px; width: auto; object-fit: contain; }
        
        .nav-link { font-family: 'Oswald', sans-serif; color: #ffffff !important; font-size: 1.1rem; font-weight: 600; letter-spacing: 0.05rem; text-transform: uppercase; padding: 0.5rem 1.2rem !important; }
        .nav-link:hover { color: #FFCC00 !important; }
        .nav-link.active { border-bottom: 4px solid #FFCC00; color: #FFCC00 !important; }
        
        h1, h2, h3, .peanuts-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        
        /* Minimalist Peanuts Table Styling */
        .table-custom { border: 2px solid #000000; }
        .table-custom thead { background-color: #000000; color: #ffffff; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05rem; }
        .table-custom th, .table-custom td { border: 1px solid #000000; padding: 12px 15px; vertical-align: middle; }
        .table-custom tbody tr:hover { background-color: #fffde6; }
        
        .img-table-thumb { height: 40px; width: 40px; object-fit: contain; border: 1px solid #000000; background-color: #f8f9fa; padding: 2px; }

        /* Minimalist Peanuts Button Styling */
        .btn-peanuts { background-color: #000000; color: #ffffff; font-family: 'Oswald', sans-serif; text-transform: uppercase; border-radius: 0px; font-weight: 600; border: 2px solid #000000; transition: all 0.2s ease; }
        .btn-peanuts:hover { background-color: #FFCC00; color: #000000; border-color: #000000; }
        .modal-custom-content { border: 3px solid #000000; border-radius: 0px; }
        .form-control-peanuts { border: 2px solid #000000; border-radius: 0px; }
        .form-control-peanuts:focus { border-color: #FFCC00; box-shadow: none; }
    </style>
</head>
<body class="d-flex flex-column vh-100">

    <div class="top-accent-banner"></div>

    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm">
        <div class="container align-items-center">
            <a class="navbar-brand" href="#">
                <img src="https://peanuts.store/cdn/shop/files/Final_Logo_Color_-_Lockup_-_Horizontal_-_Dark-min_300x@2x.png?v=1689795143" alt="PEANUTS" class="navbar-brand-logo">
            </a>
            <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#peanutsNav" aria-controls="peanutsNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="peanutsNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Merchandise</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sales.html">Activities & Sales</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="index.html">Log Out</a></li>
                </ul> 
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <header class="mb-5 border-bottom border-dark pb-3 d-flex justify-content-between align-items-end">
            <div>
                <span class="text-uppercase small fw-bold tracking-wider text-muted">Transaction Ledger</span>
                <h1 class="display-5 fw-bold mt-1">Merchant Activities & Sales Record</h1>
            </div>
        </header>

        <div class="table-responsive">
            <table class="table table-custom table-bordered shadow-sm">
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th style="width: 60px;" class="text-center">Item</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th class="text-end">Price</th>
                        <th class="text-center">Units Sold</th>
                        <th class="text-end">Gross Revenue</th>
                        <th style="width: 100px;" class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="sales-table-body">
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="editSalesModal" tabindex="-1" aria-labelledby="editSalesModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-custom-content">
                <div class="modal-header bg-dark text-white rounded-0 border-bottom-0">
                    <h5 class="modal-title peanuts-font" id="editSalesModalLabel">Edit Units Sold</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bg-white">
                    <form id="editSalesForm">
                        <input type="hidden" id="edit-product-id">
                        <div class="mb-3">
                            <label class="form-label text-uppercase small fw-bold text-muted">Product Name</label>
                            <input type="text" id="edit-product-name" class="form-control form-control-peanuts bg-light text-dark fw-bold" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="edit-units-sold" class="form-label text-uppercase small fw-bold">Units Sold</label>
                            <input type="number" id="edit-units-sold" class="form-control form-control-peanuts" min="0" required>
                        </div>
                        <div class="text-end mt-4">
                            <button type="button" class="btn btn-secondary rounded-0 pe-3 ps-3 fw-bold border-dark" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-peanuts px-4 ms-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 border-top border-dark bg-white mt-auto">
        <div class="container text-center">
            <p class="mb-1 small fw-bold text-uppercase tracking-wider peanuts-font">&copy; Anis Farhana merch PLATFORM | IMS566 DEVELOPMENT</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script>
        let editSalesModal;
        
        window.onload = function() {
            editSalesModal = new bootstrap.Modal(document.getElementById('editSalesModal'));
            
            if (!localStorage.getItem('localSalesDataset')) {
                localStorage.setItem('localSalesDataset', JSON.stringify(salesDataset));
            }
            
            renderSalesTable();

            document.getElementById('editSalesForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const targetId = parseInt(document.getElementById('edit-product-id').value);
                const newUnitsSold = parseInt(document.getElementById('edit-units-sold').value);
                
                let currentLocalData = JSON.parse(localStorage.getItem('localSalesDataset'));
                
                const recordIndex = currentLocalData.findIndex(s => s.productId === targetId);
                if (recordIndex !== -1) {
                    currentLocalData[recordIndex].unitsSold = newUnitsSold;
                } else {
                    currentLocalData.push({ productId: targetId, unitsSold: newUnitsSold });
                }
                
                localStorage.setItem('localSalesDataset', JSON.stringify(currentLocalData));
                renderSalesTable();
                
                editSalesModal.hide();
            });
        };

        function renderSalesTable() {
            const tableBody = document.getElementById('sales-table-body');
            let htmlTableString = "";
            
            // Ambil data dinamik terbaru dari localStorage
            const activeSalesData = JSON.parse(localStorage.getItem('localSalesDataset'));

            activeSalesData.forEach(record => {
                const product = productsDataset.find(p => p.id === record.productId);

                if (product) {
                    let grossRevenue = product.price * record.unitsSold;

                    htmlTableString += `
                        <tr>
                            <td class="fw-bold text-muted">#P0${product.id.toString().padStart(2, '0')}</td>
                            <td class="text-center">
                                <img src="${product.image}" alt="${product.name}" class="img-table-thumb">
                            </td>
                            <td class="fw-bold">${product.name}</td>
                            <td><span class="badge bg-dark rounded-0 px-2 py-1 text-uppercase small" style="font-size:0.7rem;">${product.category}</span></td>
                            <td class="text-end">RM ${product.price.toFixed(2)}</td>
                            <td class="text-center fw-bold text-warning-dark">${record.unitsSold.toLocaleString()}</td>
                            <td class="text-end fw-bold">RM ${grossRevenue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-peanuts py-1 px-3" onclick="openEditModal(${product.id}, '${product.name.replace(/'/g, "\\'")}', ${record.unitsSold})">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </button>
                            </td>
                        </tr>
                    `;
                }
            });

            tableBody.innerHTML = htmlTableString;
        }

        function openEditModal(productId, productName, currentUnits) {
            document.getElementById('edit-product-id').value = productId;
            document.getElementById('edit-product-name').value = productName;
            document.getElementById('edit-units-sold').value = currentUnits;
            
            editSalesModal.show();
        }
    </script>
	<script src="data.js"></script>
</body>
</html>
